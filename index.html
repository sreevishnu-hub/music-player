<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am With U Forever</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

.icon{
    font-size:80px;
}

button{
    margin-top:25px;
    width:120px;
    height:120px;
    border:none;
    border-radius:50%;
    background:#D4AF37;
    color:white;
    font-size:42px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

h2{
    color:#D4AF37;
    margin-top:30px;
}

audio{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="icon">🎵</div>

<button id="playBtn">▶</button>

<audio id="song" preload="auto">
    <source src="music.mp3/music.mpeg" type="audio/mpeg">
    Your browser does not support audio.
</audio>

<h2>I am With U Forever ❤️</h2>

</div>

<script>

const audio=document.getElementById("song");
const btn=document.getElementById("playBtn");

audio.addEventListener("error",function(){
    alert("Audio file not found.\nPlease check the file path.");
});

btn.addEventListener("click",function(){

    if(audio.paused){

        audio.play()
        .then(()=>{
            btn.innerHTML="❚❚";
        })
        .catch(err=>{
            console.log(err);
            alert("Unable to play audio.");
        });

    }else{

        audio.pause();
        btn.innerHTML="▶";

    }

});

audio.addEventListener("ended",function(){
    btn.innerHTML="▶";
});

</script>

</body>
</html>
